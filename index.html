<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="mobile-web-app-capable" content="yes">
<title>GymBuddy — Your Workout Companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="dns-prefetch" href="https://apis.google.com">
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;
  --bg2:#0a0a0a;
  --card:rgba(28,28,30,0.72);
  --card-hover:rgba(38,38,42,0.8);
  --card-border:rgba(255,255,255,0.06);
  --glass:rgba(28,28,30,0.88);
  --glass-border:rgba(255,255,255,0.08);
  --accent:#0A84FF;
  --accent2:#5E5CE6;
  --accent-grad:linear-gradient(135deg,#0A84FF,#5E5CE6);
  --accent-dim:rgba(10,132,255,0.15);
  --accent2-dim:rgba(94,92,230,0.12);
  --green:#30D158;
  --green-dim:rgba(48,209,88,0.15);
  --blue:#0A84FF;
  --blue-dim:rgba(10,132,255,0.15);
  --red:#FF453A;
  --red-dim:rgba(255,69,58,0.12);
  --orange:#FF9F0A;
  --orange-dim:rgba(255,159,10,0.12);
  --text:#F5F5F7;
  --text2:rgba(255,255,255,0.56);
  --text3:rgba(255,255,255,0.32);
  --surface:rgba(255,255,255,0.04);
  --shadow:none;
  --shadow-lg:none;
  --shadow-accent:none;
  --r:16px;
  --rs:12px;
  --rxs:8px;
}
html{scroll-behavior:smooth}
body{
  font-family:-apple-system,'SF Pro Display','SF Pro Text','DM Sans','Helvetica Neue',sans-serif;
  color:var(--text);min-height:100vh;min-height:100dvh;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;background:#000;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background:url('bg.jpg') center/cover no-repeat;
  opacity:0.35;will-change:auto;
  -webkit-backface-visibility:hidden;backface-visibility:hidden;
}
body::after{
  content:'';position:fixed;inset:0;z-index:0;
  background:linear-gradient(to bottom,rgba(0,0,0,0.5) 0%,rgba(0,0,0,0.7) 100%);
  will-change:auto;-webkit-backface-visibility:hidden;backface-visibility:hidden;
}

/* ═══ BACKGROUND ═══ */

/* ═══ LOGIN ═══ */
.login{
  position:fixed;inset:0;z-index:1000;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:24px;
  transition:opacity .6s,transform .6s cubic-bezier(.4,0,.2,1);
  background:transparent;
}
.login.out{opacity:0;transform:scale(1.08);pointer-events:none}
.login-card{
  background:rgba(28,28,30,0.65);border:1px solid rgba(255,255,255,0.08);
  -webkit-backdrop-filter:blur(20px) saturate(150%);backdrop-filter:blur(20px) saturate(150%);
  border-radius:24px;padding:40px 28px;width:100%;max-width:380px;
  text-align:center;
}
.login-icon{
  width:64px;height:64px;border-radius:16px;margin:0 auto 20px;
  background:var(--accent-grad);display:flex;align-items:center;justify-content:center;
  color:#fff;
}
.login-title{
  font-size:28px;font-weight:700;color:var(--text);
  margin-bottom:4px;letter-spacing:-0.5px;
}
.login-sub{color:var(--text3);font-size:13px;letter-spacing:0.5px;margin-bottom:28px}
.login-btn{
  display:flex;align-items:center;gap:12px;width:100%;
  padding:13px 20px;border-radius:var(--rs);border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.07);color:var(--text);font-size:14px;font-weight:500;
  cursor:pointer;transition:all .2s;justify-content:center;
}
.login-btn:hover{background:rgba(255,255,255,0.12)}
.login-btn:active{transform:scale(.98)}
.login-btn svg{width:20px;height:20px;flex-shrink:0}
.login-sep{
  color:var(--text3);font-size:11px;margin:18px 0;letter-spacing:2px;
  display:flex;align-items:center;gap:14px;text-transform:uppercase;
}
.login-sep::before,.login-sep::after{content:'';flex:1;height:1px;background:var(--card-border)}
.login-form{display:flex;flex-direction:column;gap:10px;text-align:left}
.login-form input{
  padding:12px 16px;border-radius:var(--rs);border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.06);color:var(--text);font-size:14px;
  transition:border-color .2s;
}
.login-form input:focus{outline:none;border-color:var(--accent)}
.login-form input::placeholder{color:var(--text3)}
.login-submit{
  padding:13px;border:none;border-radius:var(--rs);
  background:var(--accent);color:#fff;
  font-size:15px;font-weight:600;
  cursor:pointer;transition:opacity .2s;
}
.login-submit:hover{opacity:0.85}
.login-submit:active{transform:scale(.97)}
.login-toggle{
  margin-top:6px;color:var(--accent);font-size:13px;background:none;border:none;
  cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;text-align:center;width:100%;
}
.login-toggle:hover{text-decoration:underline}
.login-err{color:var(--red);font-size:12px;text-align:center;min-height:20px;margin-top:8px}
.login-load{color:var(--text3);font-size:13px;margin-top:8px;display:none;text-align:center}
.login-guest{
  width:100%;padding:13px;border-radius:var(--rs);
  border:1px solid rgba(255,255,255,0.1);background:transparent;
  color:var(--text2);font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;
}
.login-guest:hover{background:rgba(255,255,255,0.06);color:var(--text)}
.login-guest-note{font-size:11px;color:var(--text3);text-align:center;margin-top:8px}

/* ═══ APP ═══ */
.app{position:relative;z-index:2;max-width:680px;margin:0 auto;padding:0 20px 40px;display:none}
@media(min-width:768px){
  .app{padding:0 32px 40px}
  .exc{padding:20px}
  .banner{padding:20px 24px}
  .cycle{padding:16px 14px}
  .ex-sets-hdr,.ex-set-row{grid-template-columns:32px 1fr 1fr;gap:10px}
  .inp-g input{padding:12px 14px;font-size:15px}
  .tabs button{padding:12px 0;font-size:14px}
  .hdr-logo h1{font-size:22px}
  .p-card,.h-entry,.r-card{padding:24px}
  .login-card{padding:48px 40px;max-width:440px}
}
.app.on{display:block;animation:appIn .7s cubic-bezier(.4,0,.2,1) both}
.app-loading{
  display:flex;align-items:center;justify-content:center;
  padding:80px 20px;color:var(--text3);font-size:14px;
}
.app-loading .spinner{
  width:20px;height:20px;border:2px solid var(--text3);border-top-color:var(--accent);
  border-radius:50%;animation:spin .8s linear infinite;margin-right:10px;
}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes appIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

/* ═══ HEADER ═══ */
.hdr{
  padding:20px 0 14px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  background:rgba(0,0,0,0.85);
}
.hdr-logo{display:flex;align-items:center;gap:10px}
.hdr-logo-icon{
  width:32px;height:32px;border-radius:8px;background:var(--accent-grad);
  display:flex;align-items:center;justify-content:center;color:#fff;
}
.hdr-logo h1{
  font-size:18px;font-weight:700;color:var(--text);letter-spacing:-0.3px;
}
.hdr-right{display:flex;align-items:center;gap:8px}
.sync{width:8px;height:8px;border-radius:50%;background:var(--green)}
.sync.s{animation:syncP 1s infinite}
.sync.off{background:var(--orange)}
@keyframes syncP{0%,100%{opacity:1}50%{opacity:.3}}
.ibtn{
  width:36px;height:36px;border-radius:10px;border:none;
  background:rgba(255,255,255,0.08);color:var(--text2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:background .2s;font-size:16px;
}
.ibtn:hover{background:rgba(255,255,255,0.14)}
.avatar{width:32px;height:32px;border-radius:50%;cursor:pointer;object-fit:cover}
.av-init{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:600;background:rgba(255,255,255,0.1);color:var(--text2);cursor:pointer;
}

/* ═══ TABS ═══ */
.tabs{
  display:flex;gap:2px;padding:3px;
  background:rgba(118,118,128,0.2);border-radius:10px;margin-bottom:16px;
}
.tabs button{
  flex:1;padding:8px 0;border:none;border-radius:8px;
  font-size:13px;font-weight:500;
  color:var(--text2);background:transparent;cursor:pointer;
  transition:all .2s;
}
.tabs button.on{
  color:var(--text);background:rgba(255,255,255,0.12);
}
.tabs button:not(.on):hover{color:var(--text)}

/* ═══ CYCLE ═══ */
.cycle{
  display:flex;gap:4px;margin-bottom:16px;padding:12px 8px;
  background:rgba(28,28,30,0.88);border:1px solid rgba(255,255,255,0.06);border-radius:14px;
  
}
.cd{
  flex:1;text-align:center;padding:10px 2px;border-radius:var(--rs);
  cursor:pointer;transition:all .25s;border:1.5px solid transparent;
}
.cd:hover{background:rgba(255,255,255,0.06)}
.cd.on{background:rgba(10,132,255,0.15);border-color:rgba(10,132,255,0.3)}
.cd .n{font-size:16px;font-weight:700;display:block;line-height:1}
.cd .l{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:4px;display:block;font-weight:600}
.cd.on .n{color:var(--blue)}
.cd.rest{opacity:.35}
.cd.t-upper .n{color:var(--text)}
.cd.t-lower .n{color:var(--text)}
.cd.t-cardio .n{color:var(--text)}

/* ═══ BANNER ═══ */
.banner{
  padding:16px 18px;border-radius:14px;margin-bottom:14px;
  display:flex;align-items:center;justify-content:space-between;
  position:relative;overflow:hidden;
}
.banner.upper{background:rgba(255,69,58,0.08);border:1px solid rgba(255,69,58,0.12)}
.banner.lower{background:rgba(10,132,255,0.08);border:1px solid rgba(10,132,255,0.12)}
.banner.cardio{background:rgba(255,159,10,0.08);border:1px solid rgba(255,159,10,0.12)}
.banner.rest{background:rgba(28,28,30,0.88);border:1px solid rgba(255,255,255,0.06)}
.banner .bt{font-size:15px;font-weight:700;letter-spacing:-0.2px}
.banner .bs{font-size:11px;color:var(--text2);margin-top:3px;font-weight:500}
.badge{
  font-size:10px;font-weight:700;padding:6px 14px;border-radius:20px;
  text-transform:uppercase;letter-spacing:1px;
}
.upper .badge{background:var(--red-dim);color:var(--red)}
.lower .badge{background:var(--blue-dim);color:var(--blue)}
.cardio .badge{background:var(--orange-dim);color:var(--orange)}
.rest .badge{background:var(--surface);color:var(--text3)}
.edit-btn{
  width:36px;height:36px;border-radius:10px;border:none;
  background:rgba(255,255,255,0.08);color:var(--text2);cursor:pointer;font-size:15px;
  display:flex;align-items:center;justify-content:center;transition:all .25s;flex-shrink:0;
}
.edit-btn:hover{background:rgba(255,255,255,0.14);color:var(--text)}

/* ═══ EXERCISE CARDS ═══ */
.exlist{display:flex;flex-direction:column;gap:10px}
.exc{
  padding:16px;border-radius:14px;
  background:rgba(28,28,30,0.85);border:1px solid rgba(255,255,255,0.06);
  transition:background .15s,border-color .15s;
}
.exc:hover{background:rgba(38,38,42,0.9)}
.exc.done{border-color:rgba(48,209,88,.2);background:rgba(30,50,35,0.85)}
.exc.done:hover{background:rgba(35,55,40,0.9)}
.ex-top{display:flex;align-items:flex-start;gap:14px}
.chk{
  width:44px;height:44px;min-width:44px;border-radius:50%;
  border:none;background:transparent;
  position:relative;cursor:pointer;flex-shrink:0;margin-top:1px;
  display:flex;align-items:center;justify-content:center;
  color:transparent;font-size:14px;font-weight:700;
}
.chk::before{
  content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:24px;height:24px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);
  transition:all .2s;
}
.chk:hover::before{border-color:var(--green)}
.exc.done .chk::before{
  background:var(--green);border-color:var(--green);
}
.exc.done .chk{color:#000}
.ex-nm{font-weight:700;font-size:15px;flex:1;line-height:1.35;color:var(--text)}
.ex-meta{display:flex;gap:8px;margin-top:8px;margin-left:0;flex-wrap:wrap}
.ex-meta span{
  font-size:11px;color:var(--text2);background:rgba(118,118,128,0.2);
  padding:4px 10px;border-radius:6px;font-weight:500;
}
.ex-meta .v{color:var(--text);font-weight:700}
.ex-last{
  margin:8px 0 0 0;font-size:10px;color:var(--blue);font-weight:600;
  padding:6px 10px;background:var(--blue-dim);border-radius:var(--rxs);
  display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.ex-inp{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0 0 0}
.ex-sets{margin:10px 0 0 0}
.ex-sets-hdr{display:grid;grid-template-columns:24px 1fr 1fr;gap:6px;margin-bottom:4px}
.sets-lbl{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600;padding-left:2px}
.ex-set-row{display:grid;grid-template-columns:24px 1fr 1fr;gap:6px;margin-bottom:4px;align-items:center}
.set-num{font-size:10px;color:var(--text3);font-weight:700;text-align:center}
.inp-g label{
  display:block;font-size:9px;color:var(--text3);
  text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;font-weight:700;
}
.inp-g input{
  width:100%;padding:9px 10px;border-radius:8px;
  border:1px solid rgba(255,255,255,0.1);background:rgba(118,118,128,0.2);
  color:var(--text);font-size:14px;font-weight:500;
  transition:border-color .2s;
}
.inp-g input:focus{outline:none;border-color:var(--accent)}
.inp-g input::placeholder{color:var(--text3);font-weight:400}
.ex-prog{
  margin:8px 0 0 0;font-size:10px;color:var(--text2);font-weight:600;
  padding:5px 10px;background:var(--surface);border-radius:var(--rxs);
  display:inline-block;letter-spacing:.2px;
}

/* ═══ HISTORY ═══ */
.hist{display:none;flex-direction:column;gap:12px}
.hist.vis{display:flex}
.h-entry{
  padding:16px;border-radius:14px;background:rgba(28,28,30,0.88);
  border:1px solid rgba(255,255,255,0.06);
  
}
.h-date{
  font-size:13px;font-weight:600;
  color:var(--text);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;
}
.h-actions{display:flex;gap:4px;align-items:center}
.h-tag{
  font-family:'DM Sans',sans-serif;font-size:9px;font-weight:700;
  padding:4px 10px;border-radius:10px;letter-spacing:.3px;
}
.h-exs{display:flex;flex-direction:column;gap:2px}
.h-ex{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;border-bottom:1px solid var(--surface);font-size:13px;
}
.h-ex:last-child{border:none}
.h-ex .nm{color:var(--text2);font-weight:500}
.h-ex .st{color:var(--text);font-weight:700}
.del-btn{
  background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,.2);color:var(--red);
  font-size:10px;padding:8px 12px;border-radius:8px;cursor:pointer;min-height:36px;
  font-family:'DM Sans',sans-serif;font-weight:700;transition:all .2s;
}
.del-btn:hover{background:var(--red-dim);border-color:var(--red)}
.h-edit-btn{
  background:rgba(96,165,250,0.08);border:1px solid rgba(96,165,250,.2);color:var(--blue);
  font-size:10px;padding:8px 12px;border-radius:8px;cursor:pointer;min-height:36px;
  font-family:'DM Sans',sans-serif;font-weight:700;transition:all .2s;
}
.h-edit-btn:hover{background:var(--blue-dim)}
.h-edit-row{
  display:grid;grid-template-columns:1fr 80px 60px;gap:6px;align-items:center;
  padding:6px 0;border-bottom:1px solid var(--surface);font-size:13px;
}
.h-edit-row:last-child{border:none}
.h-edit-row .nm{color:var(--text2);font-size:12px;font-weight:500}
.h-edit-ex-name{font-size:12px;font-weight:600;color:var(--text2);padding:8px 0 3px;border-bottom:1px solid var(--surface)}
.h-edit-set{display:grid;grid-template-columns:28px 1fr 1fr;gap:6px;align-items:center;padding:4px 0}
.h-edit-row input,.h-edit-set input{
  width:100%;padding:6px 8px;border-radius:8px;border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,0.05);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;text-align:center;font-weight:600;
}
.h-edit-row input:focus{outline:none;border-color:var(--accent)}
.hist-io{display:flex;gap:8px;margin-bottom:12px}
.hist-io button{
  flex:1;padding:10px;border-radius:10px;font-family:'DM Sans',sans-serif;
  font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.hist-io .exp-btn{
  background:rgba(96,165,250,0.08);border:1px solid rgba(96,165,250,.2);color:var(--blue);
}
.hist-io .exp-btn:hover{background:var(--blue-dim)}
.hist-io .imp-btn{
  background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,.2);color:var(--green);
}
.hist-io .imp-btn:hover{background:rgba(52,211,153,0.15)}
.h-save-btn{
  margin-top:10px;width:100%;padding:10px;border:none;border-radius:var(--rxs);
  background:var(--accent);color:#fff;font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;
}
.h-save-btn:hover{opacity:0.85}

/* ═══ PROGRESS ═══ */
.prog{display:none;flex-direction:column;gap:14px}
.prog.vis{display:flex}
.p-card{
  padding:16px;border-radius:14px;background:rgba(28,28,30,0.88);
  border:1px solid rgba(255,255,255,0.06);
  
}
.p-card h3{font-size:14px;font-weight:600;margin-bottom:14px}
.p-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.p-stat{text-align:center;padding:16px;background:rgba(255,255,255,0.04);border-radius:16px;border:1px solid rgba(255,255,255,0.08)}
.p-stat .num{font-size:32px;font-weight:700;line-height:1}
.p-stat .lbl{font-size:10px;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.ring-wrap{display:flex;align-items:center;gap:16px;margin-bottom:6px}
.ring-info{flex:1}
.ring-info .nm{font-size:13px;font-weight:700;margin-bottom:4px}
.ring-info .det{font-size:11px;color:var(--text2)}
.ring-svg{width:58px;height:58px;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--surface);stroke-width:5}
.ring-fg{fill:none;stroke:url(#ringGrad);stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset .8s ease}

/* ═══ RULES ═══ */
.rules{display:none;flex-direction:column;gap:12px}
.rules.vis{display:flex}

// ═══ AUTH ═══
// Handle redirect result on page load (for mobile Google sign-in)
auth.getRedirectResult().catch(e=>{if(e.code&&e.code!=='auth/credential-already-in-use')showLoginError('Sign-in failed. Please try again.')});

document.getElementById('googleLoginBtn').addEventListener('click',async()=>{

  try{await auth.signInWithPopup(p)}

let isSignUp=false;

  isSignUp=!isSignUp;

  try{showLoginLoading(true);

  }catch(e){
    const m={'auth/user-not-found':'Invalid email or password.','auth/wrong-password':'Invalid email or password.',

});

function showLoginError(m){document.getElementById('loginError').textContent=m}
function showLoginLoading(s){document.getElementById('loginLoading').style.display=s?'block':'none';document.getElementById('googleLoginBtn').style.opacity=s?'.5':'1';document.getElementById('emailLoginBtn').style.opacity=s?'.5':'1'}

auth.onAuthStateChanged(user=>{

    guestMode=false;

    loadFromFirebase();
  }else{
    // Clean up real-time listener on sign out
    if(_fbListenerRef&&_fbListener){_fbListenerRef.off('value',_fbListener);_fbListener=null;_fbListenerRef=null}
    fbReady=false;currentUser=null;userRef=null;
    document.getElementById('loginScreen').classList.remove('out');document.getElementById('mainApp').classList.remove('on');document.getElementById('bottomBar').style.display='none';

// ═══ SYNC ═══
let fbReady=false;       // blocks Firebase writes until initial load completes
let _writeCount=0;       // counts our writes — listener skips if it hasn't caught up
let _listenCount=0;      // counts listener invocations we've skipped
let _fbListener=null;    // real-time listener handle
let _fbListenerRef=null; // ref the listener is attached to (for cleanup on user switch)

function mergeSessions(local,remote){
  // Union merge: keep ALL sessions from both sides
  // For conflicts (same key), keep the version with more completed exercises (= more data logged)
  const merged=Object.assign({},remote);
  Object.keys(local).forEach(k=>{
    if(!merged[k]){merged[k]=local[k];return}
    // Both have this session — keep the one with more completed data
    const lComp=local[k].exercises?local[k].exercises.filter(e=>e.completed).length:0;
    const rComp=merged[k].exercises?merged[k].exercises.filter(e=>e.completed).length:0;
    if(lComp>rComp)merged[k]=local[k];
    else if(lComp===rComp){
      // Same completed count — keep the one with more set data filled in
      const lData=local[k].exercises?local[k].exercises.reduce((sum,e)=>sum+(e.sets?e.sets.filter(s=>s.weight||s.reps).length:0),0):0;
      const rData=merged[k].exercises?merged[k].exercises.reduce((sum,e)=>sum+(e.sets?e.sets.filter(s=>s.weight||s.reps).length:0),0):0;
      if(lData>rData)merged[k]=local[k];
    }
  });
  return merged;
}
function mergeCustomWorkouts(local,remote){
  // Union merge: keep all days from both, remote wins for conflicts
  const merged=Object.assign({},local,remote);
  return merged;
}
function runPplMigration(obj){
  // One-time migration: clear stale customWorkouts from old plan so new PPL defaults load
  if(obj._pplMigrated)return;
  obj.customWorkouts={};
  // Remove today's ghost session so it gets recreated with new defaults
  const tk=todayKey();
  if(obj.sessions&&obj.sessions[tk]){
    const s=obj.sessions[tk];
    if(!s.exercises||!s.exercises.some(e=>e.completed||hasSetData(e)))delete obj.sessions[tk];
  }
  obj._pplMigrated=true;
}
function loadFromFirebase(){
  fbReady=false;
  // Migrate localStorage BEFORE first render so Phase 1 shows correct exercises
  state=loadLocal();
  runPplMigration(state);
  localStorage.setItem('gb_data',JSON.stringify(state));
  initSession();render();hideLoading();

  // Set up real-time listener (replaces one-time fetch)
  setSync('s');
  if(_fbListener&&_fbListenerRef){_fbListenerRef.off('value',_fbListener);_fbListener=null}
  _fbListenerRef=userRef;_writeCount=0;_listenCount=0;
  _fbListener=userRef.on('value',snap=>{
    // Skip if this is an echo from our own write
    if(_listenCount<_writeCount){_listenCount++;setSync('ok');return}
    const d=snap.val();
    const isInitial=!fbReady;
    if(d){
      const fb=d;if(!fb.sessions)fb.sessions={};if(!fb.cycleCount)fb.cycleCount=1;if(!fb.customWorkouts)fb.customWorkouts={};if(!fb.currentCycleDay||fb.currentCycleDay<1||fb.currentCycleDay>7)fb.currentCycleDay=1;
      // Run migration on Firebase data BEFORE any merging
      runPplMigration(fb);
      if(isInitial){
        // INITIAL LOAD: merge local + Firebase to preserve any offline work
        // (local is already migrated above, so no stale customWorkouts leak in)
        const local=loadLocal();
        fb.sessions=mergeSessions(local.sessions||{},fb.sessions);
        fb.customWorkouts=mergeCustomWorkouts(local.customWorkouts||{},fb.customWorkouts);
      }
      if(!isInitial){
        // Subsequent remote update (other device wrote, or reconnect after offline)
        // Preserve ONLY today's in-progress session from local state
        // (handles offline edits without resurrecting deleted sessions)
        const tk=todayKey();
        if(state.sessions&&state.sessions[tk]&&!fb.sessions[tk]){
          fb.sessions[tk]=state.sessions[tk];
        } else if(state.sessions&&state.sessions[tk]&&fb.sessions[tk]){
          // Both have today's session — keep the one with more data
          const lComp=state.sessions[tk].exercises?state.sessions[tk].exercises.filter(e=>e.completed).length:0;
          const rComp=fb.sessions[tk].exercises?fb.sessions[tk].exercises.filter(e=>e.completed).length:0;
          if(lComp>rComp)fb.sessions[tk]=state.sessions[tk];
        }
      }
      state=fb;
    }
    initSession();
    if(isInitial)mergeSessionWithPlan(state.currentCycleDay);
    localStorage.setItem('gb_data',JSON.stringify(state));
    if(isInitial){
      // Push merged result back to Firebase once (in case local had offline sessions)
      fbReady=true;
      _writeCount++;
      userRef.set(state).then(()=>setSync('ok')).catch(()=>{_writeCount--;setSync('off')});
    }
    render();setSync('ok');
  },()=>{
    // Listener error / offline — allow local use, don't overwrite anything
    fbReady=true;
    setSync('off');
  });
}
function hideLoading(){
  const el=document.getElementById('appLoading');if(el)el.style.display='none';
  document.getElementById('cycleBar').style.display='';
  document.querySelectorAll('.tabs').forEach(t=>t.style.display='');
}
let _saveTimer=null;
function saveState(immediate){
  localStorage.setItem('gb_data',JSON.stringify(state));
  if(guestMode)return;
  // Block Firebase writes until initial load completes — prevents empty state overwriting real data
  if(!fbReady||!userRef)return;
  clearTimeout(_saveTimer);
  if(immediate){
    _writeCount++;
    setSync('s');userRef.set(state).then(()=>setSync('ok')).catch(()=>{_writeCount--;setSync('off')});
  } else {
    _saveTimer=setTimeout(()=>{_writeCount++;setSync('s');userRef.set(state).then(()=>setSync('ok')).catch(()=>{_writeCount--;setSync('off')})},1000);
  }
}
// Flush pending saves when user leaves page or app goes to background
function flushPendingSave(){if(_saveTimer){clearTimeout(_saveTimer);_saveTimer=null;if(userRef&&!guestMode&&fbReady){_writeCount++;userRef.set(state).catch(()=>{_writeCount--})}}}
window.addEventListener('beforeunload',flushPendingSave);
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden')flushPendingSave()})
function loadLocal(){
  try{const r=localStorage.getItem('gb_data');if(r){const s=JSON.parse(r);if(!s.sessions)s.sessions={};if(!s.cycleCount)s.cycleCount=1;if(!s.customWorkouts)s.customWorkouts={};return s}}catch(e){}
  return defState();
}
function setSync(s){const d=document.getElementById('syncDot');d.className='sync'+(s==='s'?' s':s==='off'?' off':'');const t=s==='ok'?'Synced':s==='s'?'Syncing...':'Offline';d.title=t;d.setAttribute('aria-label',t)}

function getWorkouts(day){if(state.customWorkouts&&state.customWorkouts[day])return state.customWorkouts[day];return DEFAULT_WK[day]||[]}

let state=defState();
function defState(){return{currentCycleDay:1,cycleCount:1,sessions:{},todaySession:null,customWorkouts:{}}}
function safeDay(d){return(d>=1&&d<=7)?d:1}
function todayKey(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}_C${state.cycleCount}_D${state.currentCycleDay}`}

function renderCycle(){
  const bar=document.getElementById('cycleBar');
  bar.innerHTML=CYCLE.map(c=>{
    const on=c.day===state.currentCycleDay?'on':'';
    const isRest=c.type==='rest';
    const lbl=isRest?'REST':c.focus.split(' ')[0].slice(0,4).toUpperCase();
    return`<div class="cd ${isRest?'rest':''} ${on}" data-day="${c.day}"><span class="n">${c.day}</span><span class="l">${lbl}</span></div>`;
  }).join('');
  bar.querySelectorAll('.cd').forEach(el=>{el.addEventListener('click',()=>{
    const newDay=parseInt(el.dataset.day);if(newDay===state.currentCycleDay)return;
    const key=state.todaySession,sess=key?state.sessions[key]:null;
    const hasData=sess&&sess.exercises&&sess.exercises.some(e=>hasSetData(e));
    function doSwitch(){cleanGhostSession();state.currentCycleDay=newDay;initSession();saveState(true);render()}
    if(hasData&&!sess.exercises.some(e=>e.completed)){showModal('Switch Day','You have unsaved data. Switch day and discard it?',doSwitch)}
    else doSwitch();
  })});
}

// ═══ SESSION ═══
function initSession(){
  const key=todayKey();
  if(!state.sessions[key]){
    const exs=getWorkouts(state.currentCycleDay),last=lastSession(state.currentCycleDay);
    state.sessions[key]={date:new Date().toISOString(),cycleDay:state.currentCycleDay,cycleCount:state.cycleCount,dayName:CYCLE[safeDay(state.currentCycleDay)-1].name,
      exercises:exs.map(ex=>{
        const le=last?last.exercises.find(e=>e.name===ex.n&&e.completed):null;
        const numSets=ex.u===''?Math.max(ex.s,0):(ex.s||1);
        // Carry forward last session's weights per set
        const sets=[];
        for(let si=0;si<numSets;si++){
          const lastSet=le&&le.sets&&le.sets[si]?le.sets[si]:null;
          sets.push({weight:'',reps:''});
        }
        const cw=le&&le.sets&&le.sets[0]&&le.sets[0].weight?parseFloat(le.sets[0].weight):ex.w;
        return{name:ex.n,targetSets:ex.s,targetReps:ex.r,rest:ex.rest,startWeight:cw,originalWeight:ex.w,unit:ex.u,progression:ex.p,sets:sets,completed:false};
      })};
  }
  state.todaySession=key;
}
function lastSession(cd){
  const tk=todayKey();
  const dayName=CYCLE[safeDay(cd)-1].name;
  // Find the most recent COMPLETED session for this day type
  // Match by day name (survives reordering) OR by day number
  const matches=Object.keys(state.sessions).filter(k=>{
    if(k===tk)return false;
    const s=state.sessions[k];
    // Must have at least one completed exercise
    if(!s.exercises||!s.exercises.some(e=>e.completed))return false;
    if(s.dayName===dayName)return true;
    const m=k.match(/_D(\d+)$/);
    return m&&parseInt(m[1])===cd;
  }).sort().reverse();
  return matches.length>0?state.sessions[matches[0]]:null;
}
function cleanGhostSession(){
  const key=state.todaySession;if(!key||!state.sessions[key])return;
  const s=state.sessions[key];
  if(!s.exercises||!s.exercises.some(e=>e.completed||hasSetData(e)))delete state.sessions[key];
}
function hasSetData(ex){
  if(ex.sets)return ex.sets.some(s=>s.weight||s.reps);
  return ex.loggedWeight||ex.loggedReps;
}
function mergeSessionWithPlan(day){
  const key=todayKey(),old=state.sessions[key];if(!old||old.cycleDay!==day)return;
  const exs=getWorkouts(day),last=lastSession(day);
  old.exercises=exs.map(ex=>{
    const oe=old.exercises.find(e=>e.name===ex.n);
    const le=last?last.exercises.find(e=>e.name===ex.n&&e.completed):null;
    const numSets=ex.u===''?Math.max(ex.s,0):(ex.s||1);
    const cw=le&&le.sets&&le.sets[0]&&le.sets[0].weight?parseFloat(le.sets[0].weight):ex.w;
    if(oe){
      // Preserve existing set data, adjust array length to match new set count
      const sets=[];
      for(let si=0;si<numSets;si++){sets.push(oe.sets&&oe.sets[si]?oe.sets[si]:{weight:'',reps:''})}
      return{name:ex.n,targetSets:ex.s,targetReps:ex.r,rest:ex.rest,startWeight:cw,originalWeight:ex.w,unit:ex.u,progression:ex.p,sets:sets,completed:oe.completed};
    }
    const sets=[];for(let si=0;si<numSets;si++){sets.push({weight:'',reps:''})}
    return{name:ex.n,targetSets:ex.s,targetReps:ex.r,rest:ex.rest,startWeight:cw,originalWeight:ex.w,unit:ex.u,progression:ex.p,sets:sets,completed:false};
  });
  old.dayName=CYCLE[safeDay(day)-1].name;
}

function renderHistory(){
  const p=document.getElementById('historyTab'),keys=Object.keys(state.sessions).sort().reverse();
  const logged=keys.filter(k=>{const s=state.sessions[k];return s.exercises&&s.exercises.some(e=>e.completed)});
  const ioBar=`<div class="hist-io"><button class="exp-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Export XLSX</button><button class="imp-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>Import XLSX</button></div><input type="file" id="xlsxImport" accept=".xlsx,.xls" style="display:none">`;
  if(!logged.length){
    // Note: ioBar contains only static SVG/HTML with no user data — safe to use with innerHTML
    p.innerHTML=ioBar+`<div class="empty"><div class="ico"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></div><p>No logged sessions yet.<br>Complete a workout and hit LOG SESSION!</p></div>`;
    p.querySelector('.exp-btn').addEventListener('click',exportHistory);
    p.querySelector('.imp-btn').addEventListener('click',()=>document.getElementById('xlsxImport').click());
    document.getElementById('xlsxImport').addEventListener('change',importHistory);
    return;
  }
  const tc={upper:'var(--red)',lower:'var(--blue)',cardio:'var(--orange)',rest:'var(--text3)'},bg={upper:'var(--red-dim)',lower:'var(--blue-dim)',cardio:'var(--orange-dim)',rest:'var(--surface)'};
  // Note: ioBar is static HTML, session data is escaped via esc() — safe innerHTML usage
  p.innerHTML=ioBar+logged.map(key=>{
    const s=state.sessions[key],ds=key.split('_')[0],d=new Date(ds+'T00:00:00');
    const fmt=d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'}),ci=CYCLE[(s.cycleDay||1)-1]||CYCLE[0];
    return`<div class="h-entry" data-k="${key}"><div class="h-date"><span>${fmt} &mdash; Day ${s.cycleDay}</span><div class="h-actions"><span class="h-tag" style="background:${bg[ci.type]||'var(--surface)'};color:${tc[ci.type]||'var(--text3)'}">${esc(s.dayName||'')}</span><button class="h-edit-btn" data-k="${key}">Edit</button><button class="del-btn" data-k="${key}" aria-label="Delete"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div></div>
      <div class="h-exs" id="hexs-${key.replace(/[^a-zA-Z0-9]/g,'_')}">${s.exercises.filter(e=>e.completed).map(e=>{
        if(e.sets&&e.sets.length){
          const setsStr=e.sets.map((s,si)=>`${s.weight||'-'}x${s.reps||'-'}`).join(' / ');
          return`<div class="h-ex"><span class="nm">${esc(e.name)}</span><span class="st">${setsStr} ${e.unit&&e.unit!=='BW'?e.unit:(e.unit==='BW'?'BW':'')}</span></div>`;
        }
        return`<div class="h-ex"><span class="nm">${esc(e.name)}</span><span class="st">${e.loggedWeight||'-'}x${e.loggedReps||'-'} ${e.unit||''}</span></div>`;
      }).join('')}</div></div>`;
  }).join('');
  p.querySelector('.exp-btn').addEventListener('click',exportHistory);
  p.querySelector('.imp-btn').addEventListener('click',()=>document.getElementById('xlsxImport').click());
  document.getElementById('xlsxImport').addEventListener('change',importHistory);
  p.querySelectorAll('.del-btn').forEach(b=>{b.addEventListener('click',()=>{showModal('Delete Session','Delete this session permanently?',()=>{delete state.sessions[b.dataset.k];saveState(true);renderHistory();renderWorkout()})})});
  p.querySelectorAll('.h-edit-btn').forEach(b=>{b.addEventListener('click',()=>{
    // Cancel any other open edit — re-render first, then re-click this button
    let hasOtherEdit=false;
    p.querySelectorAll('.h-edit-btn').forEach(ob=>{if(ob!==b&&ob.textContent==='Save')hasOtherEdit=true});
    if(hasOtherEdit){renderHistory();const newBtn=p.querySelector(`.h-edit-btn[data-k="${b.dataset.k}"]`);if(newBtn)newBtn.click();return}
    const key=b.dataset.k,s=state.sessions[key];if(!s)return;
    const sk=key.replace(/[^a-zA-Z0-9]/g,'_'),c=document.getElementById('hexs-'+sk),comp=s.exercises.filter(e=>e.completed);
    if(b.textContent==='Save'){
      let v=true;c.querySelectorAll('.h-edit-set').forEach(row=>{
        row.querySelectorAll('input').forEach(inp=>{
          inp.classList.remove('inp-err');const val=inp.value.trim();
          if(val&&(isNaN(parseFloat(val))||parseFloat(val)<0||parseFloat(val)>999)){inp.classList.add('inp-err');v=false}
        });
      });
      if(!v){showToast('Fix invalid values');return}
      c.querySelectorAll('.h-edit-set').forEach(row=>{
        const oi=parseInt(row.dataset.oi),si=parseInt(row.dataset.si);
        const w=row.querySelector('[data-hf="w"]').value.trim(),r=row.querySelector('[data-hf="r"]').value.trim();
        if(s.exercises[oi].sets&&s.exercises[oi].sets[si]){
          s.exercises[oi].sets[si].weight=w;s.exercises[oi].sets[si].reps=r;
        } else {
          // Migrate old format to sets array
          s.exercises[oi].sets=[{weight:w,reps:r}];
          s.exercises[oi].loggedWeight=w;s.exercises[oi].loggedReps=r;
        }
      });
      saveState(true);b.textContent='Edit';renderHistory();renderWorkout();showToast('Session updated!');return;
    }
    b.textContent='Save';
    c.innerHTML=comp.map(e=>{
      const oi=s.exercises.indexOf(e);
      if(e.sets&&e.sets.length){
        return`<div class="h-edit-ex-name">${esc(e.name)}</div>`+e.sets.map((st,si)=>
          `<div class="h-edit-set" data-oi="${oi}" data-si="${si}"><span class="set-num">S${si+1}</span><input data-hf="w" value="${st.weight||''}" placeholder="Wt" inputmode="decimal"><input data-hf="r" value="${st.reps||''}" placeholder="Reps" inputmode="numeric"></div>`
        ).join('');
      }
      return`<div class="h-edit-set" data-oi="${oi}" data-si="0"><span class="nm">${esc(e.name)}</span><input data-hf="w" value="${e.loggedWeight||''}" placeholder="Wt" inputmode="decimal"><input data-hf="r" value="${e.loggedReps||''}" placeholder="Reps" inputmode="numeric"></div>`;
    }).join('');
  })});
}

// ═══ HISTORY EXPORT/IMPORT ═══
function checkXLSX(){if(typeof XLSX==='undefined'){showToast('XLSX library not loaded — check your connection');return false}return true}
function exportHistory(){
  if(!checkXLSX())return;
  const keys=Object.keys(state.sessions).sort();
  const rows=[];
  keys.forEach(key=>{
    const s=state.sessions[key];if(!s.exercises||!s.exercises.some(e=>e.completed))return;
    const ds=key.split('_')[0],d=new Date(ds+'T00:00:00');
    const date=d.toLocaleDateString('en-US',{year:'numeric',month:'2-digit',day:'2-digit'});
    s.exercises.filter(e=>e.completed).forEach(e=>{
      if(e.sets&&e.sets.length){
        e.sets.forEach((st,si)=>{
          rows.push({Date:date,Day:s.cycleDay,DayName:s.dayName||'',Cycle:s.cycleCount||1,Exercise:e.name,Set:si+1,Weight:st.weight||'',Reps:st.reps||'',Unit:e.unit||'kg'});
        });
      } else {
        rows.push({Date:date,Day:s.cycleDay,DayName:s.dayName||'',Cycle:s.cycleCount||1,Exercise:e.name,Set:1,Weight:e.loggedWeight||'',Reps:e.loggedReps||'',Unit:e.unit||'kg'});
      }
    });
  });
  if(!rows.length){showToast('No sessions to export');return}
  const ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=[{wch:12},{wch:5},{wch:18},{wch:6},{wch:28},{wch:5},{wch:8},{wch:6},{wch:5}];
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'History');
  XLSX.writeFile(wb,'GymBuddy_History.xlsx');
  showToast('Exported '+rows.length+' rows');
}
function importHistory(ev){
  if(!checkXLSX())return;
  const file=ev.target.files[0];if(!file)return;ev.target.value='';
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws);
      if(!rows.length){showToast('Empty file');return}
      // Validate required columns
      const req=['Date','Exercise','Set','Weight','Reps'];
      const cols=Object.keys(rows[0]);
      const missing=req.filter(r=>!cols.includes(r));
      if(missing.length){showToast('Missing columns: '+missing.join(', '));return}
      // Group rows into sessions
      const grouped={};
      rows.forEach(r=>{
        const dp=new Date(r.Date);if(isNaN(dp))return;
        const ds=dp.toISOString().slice(0,10);
        const day=Math.min(7,Math.max(1,parseInt(r.Day)||1)),cycle=Math.max(1,parseInt(r.Cycle)||1);
        const skey=ds+'_C'+cycle+'_D'+day;
        if(!grouped[skey])grouped[skey]={date:dp.toISOString(),cycleDay:day,cycleCount:cycle,dayName:String(r.DayName||CYCLE[day-1].name).slice(0,40),exercises:{}};
        const exName=String(r.Exercise).slice(0,80);
        if(!grouped[skey].exercises[exName])grouped[skey].exercises[exName]={name:exName,unit:String(r.Unit||'kg'),sets:[]};
        grouped[skey].exercises[exName].sets.push({weight:String(r.Weight||''),reps:String(r.Reps||'')});
      });
      let imported=0;
      Object.keys(grouped).forEach(skey=>{
        const g=grouped[skey];
        const exArr=Object.values(g.exercises).map(ex=>({
          name:ex.name,targetSets:ex.sets.length,targetReps:'',rest:'',startWeight:0,originalWeight:0,unit:ex.unit,progression:'',
          sets:ex.sets,completed:true
        }));
        if(!state.sessions[skey]){
          state.sessions[skey]={date:g.date,cycleDay:g.cycleDay,cycleCount:g.cycleCount,dayName:g.dayName,exercises:exArr};
          imported++;
        }
      });
      if(imported>0){saveState(true);renderHistory();renderWorkout()}
      showToast(imported>0?'Imported '+imported+' sessions':"No new sessions (duplicates skipped)");
    }catch(err){showToast('Error reading file')}
  };
  reader.readAsArrayBuffer(file);
}

// ═══ PROGRESS ═══
function renderProgress(){
  const p=document.getElementById('progressTab'),names=new Set();
  for(let d=1;d<=7;d++){getWorkouts(d).forEach(e=>{if(e.w>0)names.add(e.n)})}
  Object.values(state.sessions).forEach(s=>{if(!s.exercises)return;s.exercises.forEach(e=>{
    if(!e.completed)return;
    if(e.sets&&e.sets.some(s=>s.weight&&parseFloat(s.weight)>0))names.add(e.name);
    else if(e.loggedWeight&&parseFloat(e.loggedWeight)>0)names.add(e.name);
  })});
  const pd=[];
  names.forEach(name=>{
    const logs=[];Object.keys(state.sessions).sort().forEach(k=>{const s=state.sessions[k];if(!s.exercises)return;const ex=s.exercises.find(e=>e.name===name&&e.completed);if(!ex)return;
      if(ex.sets&&ex.sets.length){const maxW=Math.max(...ex.sets.map(s=>parseFloat(s.weight)||0));if(maxW>0)logs.push({w:maxW,r:parseInt(ex.sets[0].reps)||0})}
      else if(ex.loggedWeight){logs.push({w:parseFloat(ex.loggedWeight),r:parseInt(ex.loggedReps)||0})}});
    let sw=0,unit='kg';for(let d=1;d<=7;d++){const f=getWorkouts(d).find(e=>e.n===name);if(f){sw=f.w;unit=f.u||'kg';break}}
    if(logs.length>0){const lat=logs[logs.length-1];pd.push({name,sw,cw:lat.w,change:lat.w-sw,sess:logs.length,unit})}
  });
  if(!pd.length){p.innerHTML=`<div class="empty"><div class="ico"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div><p>Log sessions to see progression.</p></div>`;return}
  const total=Object.keys(state.sessions).filter(k=>state.sessions[k].exercises&&state.sessions[k].exercises.some(e=>e.completed)).length,circ=2*Math.PI*22;
  p.innerHTML=`<div class="p-card"><h3>Overview</h3><div class="p-stats"><div class="p-stat"><div class="num" style="color:var(--accent)">${total}</div><div class="lbl">Sessions</div></div><div class="p-stat"><div class="num" style="color:var(--accent2)">${pd.length}</div><div class="lbl">Exercises</div></div></div></div>
    ${pd.map(x=>{const pct=x.sw>0?Math.min(100,Math.max(5,(x.cw/(x.sw*1.5))*100)):50;const off=circ-(circ*pct/100);const cs=x.change>=0?`+${x.change}`:`${x.change}`;const cc=x.change>=0?'var(--green)':'var(--red)';
      return`<div class="p-card"><div class="ring-wrap"><svg class="ring-svg" viewBox="0 0 56 56"><circle class="ring-bg" cx="28" cy="28" r="22"/><circle class="ring-fg" cx="28" cy="28" r="22" stroke-dasharray="${circ}" stroke-dashoffset="${off}"/></svg><div class="ring-info"><div class="nm">${esc(x.name)}</div><div class="det">Start: ${x.sw} ${x.unit} &rarr; Now: <strong>${x.cw} ${x.unit}</strong> <span style="color:${cc}">(${cs})</span></div><div class="det">${x.sess} session${x.sess>1?'s':''}</div></div></div></div>`}).join('')}`;
}

// ═══ TABS ═══
const tabs=document.querySelectorAll('.tabs button'),panels={workout:document.getElementById('workoutTab'),history:document.getElementById('historyTab'),progress:document.getElementById('progressTab'),rules:document.getElementById('rulesTab')};
function switchTab(n){
  tabs.forEach(t=>t.classList.toggle('on',t.dataset.tab===n));
  Object.entries(panels).forEach(([k,p])=>{if(k==='workout')p.style.display=k===n?'block':'none';else{p.classList.toggle('vis',k===n);p.style.display=k===n?'':'none'}});
  document.getElementById('cycleBar').style.display=n==='workout'?'flex':'none';
  document.getElementById('bottomBar').style.display=n==='workout'?'block':'none';
  if(n==='history')renderHistory();if(n==='progress')renderProgress();if(n==='rules')renderRules();if(n==='workout')renderWorkout();
}
tabs.forEach(t=>t.addEventListener('click',()=>switchTab(t.dataset.tab)));

// ═══ LOG SESSION ═══
let _logLocked=false;
document.getElementById('saveBtn').addEventListener('click',()=>{
  if(_logLocked)return;
  const sess=state.sessions[state.todaySession];if(!sess)return;
  const cnt=sess.exercises.filter(e=>e.completed).length;
  if(!cnt){showToast('Check off at least one exercise!');return}
  const warns=validateSession(sess);if(warns.length){showToast(warns[0]);return}
  showModal('Log Session',`Log ${cnt}/${sess.exercises.length} exercises and advance to next day?`,()=>{
    _logLocked=true;
    const next=state.currentCycleDay>=7?1:state.currentCycleDay+1;
    if(next===1)state.cycleCount=(state.cycleCount||1)+1;
    state.currentCycleDay=next;
    initSession();saveState(true);
    const btn=document.getElementById('saveBtn');btn.textContent='SESSION LOGGED \u2713';btn.classList.add('saved');
    showToast(`Logged! ${cnt}/${sess.exercises.length} exercises`);
    setTimeout(()=>{_logLocked=false;btn.textContent='LOG SESSION';btn.classList.remove('saved');render()},2000);
  });
});

document.getElementById('editSave').addEventListener('click',()=>{

  c.querySelectorAll('.inp-err').forEach(el=>el.classList.remove('inp-err'));c.querySelectorAll('.err-msg').forEach(el=>el.remove());
  const newList=[];let hasErr=false;
  c.querySelectorAll('.edit-ex').forEach(card=>{
    const nI=card.querySelector('[data-f="n"]'),sI=card.querySelector('[data-f="s"]'),rI=card.querySelector('[data-f="r"]'),reI=card.querySelector('[data-f="rest"]'),wI=card.querySelector('[data-f="w"]'),uS=card.querySelector('[data-f="u"]'),pI=card.querySelector('[data-f="p"]');
    const name=nI.value.trim(),sets=parseInt(sI.value)||0,reps=rI.value.trim(),rest=reI.value.trim()||'-',weight=parseFloat(wI.value)||0,unit=uS.value,prog=pI.value.trim();
    if(!name){nI.classList.add('inp-err');hasErr=true;addErrMsg(nI,'Required')}
    if(!reps){rI.classList.add('inp-err');hasErr=true;addErrMsg(rI,'Required')}
    if(sets<0||sets>20){sI.classList.add('inp-err');hasErr=true;addErrMsg(sI,'0-20')}
    if(weight<0){wI.classList.add('inp-err');hasErr=true;addErrMsg(wI,'Must be 0+')}
    newList.push({n:name,s:sets,r:reps,rest,w:weight,u:unit,p:prog});
  });
  if(hasErr){errEl.textContent='Fix errors above.';return}
  if(!state.customWorkouts)state.customWorkouts={};state.customWorkouts[editingDay]=newList;
  mergeSessionWithPlan(editingDay);saveState(true);initSession();render();closeEditPanel();showToast('Workout updated!');
});
function addErrMsg(inp,msg){const el=document.createElement('div');el.className='err-msg';el.textContent=msg;inp.parentElement.appendChild(el)}

// ═══ UTILS ═══
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800)}
let modalCb=null;
function showModal(title,text,cb){document.getElementById('modalTitle').textContent=title;document.getElementById('modalText').textContent=text;document.getElementById('modal').classList.add('show');modalCb=cb}
document.getElementById('modalCancel').addEventListener('click',()=>{document.getElementById('modal').classList.remove('show');modalCb=null});
document.getElementById('modalConfirm').addEventListener('click',()=>{document.getElementById('modal').classList.remove('show');if(modalCb)modalCb();modalCb=null});
// Escape key closes modal and edit panel
document.addEventListener('keydown',e=>{if(e.key==='Escape'){
  if(document.getElementById('modal').classList.contains('show')){document.getElementById('modal').classList.remove('show');modalCb=null}
  else if(document.getElementById('editPanel').classList.contains('open')){closeEditPanel()}
}});

function validateSession(sess){
  const w=[];sess.exercises.forEach(ex=>{if(ex.completed){
    if(ex.sets&&ex.sets.length){
      let hasAnyData=false;
      ex.sets.forEach((s,si)=>{
        if(s.weight||s.reps)hasAnyData=true;
        if(s.weight&&(isNaN(parseFloat(s.weight))||parseFloat(s.weight)<0||parseFloat(s.weight)>999))w.push(`${ex.name} S${si+1}: invalid weight`);
        if(s.reps&&(isNaN(parseInt(s.reps))||parseInt(s.reps)<0||parseInt(s.reps)>999))w.push(`${ex.name} S${si+1}: invalid reps`);
      });
      if(ex.unit!==''&&!hasAnyData)w.push(`${ex.name}: add data for at least one set`);
    }
  }});return w;
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function render(){renderCycle();renderWorkout()}
document.getElementById('copyYear').textContent=new Date().getFullYear();
</script>
</body>
